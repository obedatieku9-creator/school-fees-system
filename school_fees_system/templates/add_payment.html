{% extends "base.html" %}

{% block title %}Record Payment - School Fees Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-credit-card"></i> Record Payment</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {{ csrf_token() }}
                    <div class="mb-3">
                        <label for="student_id" class="form-label">Student</label>
                        <select class="form-control" id="student_id" name="student_id" required onchange="updateStudentInfo()">
                            <option value="">Select Student</option>
                            {% for student in students %}
                            <option value="{{ get_item(student, 'student_id') }}" data-name="{{ get_item(student, 'full_name') }}" data-class="{{ get_item(student, 'class_name') }}">{{ get_item(student, 'full_name') }} ({{ get_item(student, 'student_id') }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div id="student-info" class="mb-3" style="display: none;">
                        <div class="card bg-light">
                            <div class="card-body">
                                <h6>Student Information</h6>
                                <p><strong>Name:</strong> <span id="student-name"></span></p>
                                <p><strong>Class:</strong> <span id="student-class"></span></p>
                                <p><strong>Outstanding Balance:</strong> <span id="student-balance"></span></p>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="amount" class="form-label">Amount Paid (GHS)</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="term" class="form-label">Term</label>
                            <select class="form-control" id="term" name="term" required>
                                <option value="First Term">First Term</option>
                                <option value="Second Term">Second Term</option>
                                <option value="Third Term">Third Term</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="payment_date" class="form-label">Payment Date</label>
                            <input type="date" class="form-control" id="payment_date" name="payment_date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="payment_method" class="form-label">Payment Method</label>
                            <select class="form-control" id="payment_method" name="payment_method" required>
                                <option value="Cash">Cash</option>
                                <option value="Mobile Money">Mobile Money</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Record Payment
                        </button>
                        <a href="{{ url_for('payments') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function updateStudentInfo() {
    const select = document.getElementById('student_id');
    const selectedOption = select.options[select.selectedIndex];
    const studentInfo = document.getElementById('student-info');

    if (selectedOption.value) {
        document.getElementById('student-name').textContent = selectedOption.getAttribute('data-name');
        document.getElementById('student-class').textContent = selectedOption.getAttribute('data-class');
        // For simplicity, balance calculation would require AJAX call
        document.getElementById('student-balance').textContent = 'To be calculated';
        studentInfo.style.display = 'block';
    } else {
        studentInfo.style.display = 'none';
    }
}

// Set default payment date to today
document.getElementById('payment_date').valueAsDate = new Date();
</script>
{% endblock %}
