{% extends "base.html" %}

{% block title %}Edit Student - School Fees Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-edit"></i> Edit Student</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {{ csrf_token() }}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ get_item(student, 'full_name') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-control" id="gender" name="gender" required>
                                <option value="Male" {% if get_item(student, 'gender') == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if get_item(student, 'gender') == 'Female' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ get_item(student, 'date_of_birth') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="class_id" class="form-label">Class</label>
                            <select class="form-control" id="class_id" name="class_id" required>
                                {% for cls in classes %}
                                <option value="{{ cls[0] }}" {% if cls[0] == get_item(student, 'class_id') %}selected{% endif %}>{{ cls[1] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="parent_name" class="form-label">Parent/Guardian Name</label>
                        <input type="text" class="form-control" id="parent_name" name="parent_name" value="{{ get_item(student, 'parent_name') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="parent_phone" class="form-label">Parent Phone</label>
                        <input type="tel" class="form-control" id="parent_phone" name="parent_phone" value="{{ get_item(student, 'parent_phone') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3" required>{{ get_item(student, 'address') }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Student
                        </button>
                        <a href="{{ url_for('students') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
